  react-router:
    "@react-router/dev": "7.14.2"
    "@react-router/node": "7.14.2"
    "@react-router/serve": "7.14.2"
    "react-router": "7.14.2"

  tailwindcss:
    "@tailwindcss/vite": "4.2.4"
    "tailwindcss": "4.2.4"

  tanstack-start:
    "@tanstack/react-router": "^1.168.25"
    "@tanstack/react-start": "^1.167.50"
    "@tanstack/router-plugin": "^1.167.28"

