  icons:
    "@phosphor-icons/react": "^2.1.10"
    "@remixicon/react": "^4.9.0"
    "@tabler/icons-react": "^3.41.1"

  drizzle:
    drizzle-kit: 1.0.0-beta.22
    drizzle-orm: 1.0.0-beta.22

  hono:
