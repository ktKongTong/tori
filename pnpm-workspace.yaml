  vitest: "catalog:"

catalog:
  "babel-plugin-react-compiler": "1.0.0"
  "@rolldown/plugin-babel": "0.2.3"
  "@types/bun": 1.3.13
  "@types/deno": 2.5.0
  "@types/node": ^24
  "@vitejs/plugin-react": "6.0.1"
  "@voidzero-dev/vite-plus-core": latest
  better-result: "^2.8.2"
  nitro: latest
  typescript: npm:@typescript/native-preview@latest
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: "^4.3.6"
  react-router-hono-server: 2.26.0
catalogMode: prefer
catalogs:
  better-auth:
